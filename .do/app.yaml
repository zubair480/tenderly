name: tenderly-api
region: sfo
services:
  - name: api
    github:
      repo: arjun-vaidya/tenderly
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 8080
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /
    health_check:
      http_path: /api/health
    envs:
      - key: GRADIENT_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: GRADIENT_MODEL
        scope: RUN_TIME
        value: "llama-4-maverick"
      - key: GRADIENT_BASE_URL
        scope: RUN_TIME
        value: "https://inference.do-ai.run/v1"
      - key: SOCRATA_BASE_URL
        scope: RUN_TIME
        value: "https://data.sfgov.org/resource/vw6y-z8j6.json"
      - key: NEEDS_CACHE_TTL_SECONDS
        scope: RUN_TIME
        value: "600"
